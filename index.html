<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>栗原直行 オフィシャルサイト</title>
    <meta
      name="description"
      content="栗原直行のプロフィール、出演情報、お知らせ、活動実績を掲載するオフィシャルサイトです。"
    />

    <link rel="stylesheet" href="styles.css?v=20260616-47" />
    <script src="script.js?v=20260616-15" defer></script>
  </head>
  <body>
    <header id="top" class="site-header home-site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <div class="container nav-inner">
          <a class="nav-logo" href="#top">
            <img
              class="nav-logo-image"
              src="assets/studio-romancing-logo-transparent.png"
              alt="Studio Romancing"
            />
            <span>栗原直行 Official Website</span>
          </a>
          <div class="nav-links">
            <a href="news.html">News</a>
            <a href="schedule.html">Schedule</a>
            <a href="profile.html">Profile</a>
            <a href="discography.html">Discography</a>
            <a href="#contact">Contact</a>
          </div>
        </div>
      </nav>

      <div class="container header-inner">
        <div class="hero-copy home-hero-copy">
          <div class="hero-text">
            <p id="hero-label" class="eyebrow">Official Website</p>
            <h1 id="artist-name">栗原直行</h1>
            <p class="hero-subtitle">NAOYUKI KURIHARA</p>
          </div>
          <figure class="hero-portrait">
            <img
              src="assets/naoyuki-kurihara-guitar.png"
              alt="栗原直行の演奏写真"
            />
          </figure>
        </div>
      </div>
    </header>

    <main>
      <section id="news" class="section news-section">
        <div class="container section-inner">
          <div class="section-heading">
            <p class="eyebrow">Information</p>
            <h2>News</h2>
          </div>
          <div id="news-list" class="card-list" aria-live="polite">
            <p class="muted">お知らせを読み込んでいます。</p>
          </div>
        </div>
      </section>

      <section id="schedule" class="section schedule-section">
        <div class="container section-inner">
          <div class="section-heading">
            <p class="eyebrow">Live / Event</p>
            <h2>Schedule</h2>
          </div>
          <div id="schedule-list" class="card-list" aria-live="polite">
            <p class="muted">出演情報を読み込んでいます。</p>
          </div>
        </div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="container section-inner">
          <div class="section-heading">
            <h2>Contact</h2>
          </div>
          <div id="contact-content" class="contact-content" aria-live="polite">
            <p class="muted">お問い合わせ情報を読み込んでいます。</p>
          </div>

          <div class="contact-social" aria-label="Official SNS">
            <h3>Official SNS</h3>
            <div class="sns-link-list">
              <a
                class="sns-link"
                href="https://www.instagram.com/studioromancing/"
                target="_blank"
                rel="noopener noreferrer"
               aria-label="Instagram" title="Instagram">
              <span class="sns-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <rect x="3.5" y="3.5" width="17" height="17" rx="5" fill="none" stroke="currentColor" stroke-width="1.8" />
                  <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8" />
                  <circle cx="17.3" cy="6.7" r="1.2" fill="currentColor" />
                </svg>
              </span>
              <span class="visually-hidden">Instagram</span>
            </a>
              <a
                class="sns-link"
                href="https://www.youtube.com/@%E6%A0%97%E5%8E%9F%E7%9B%B4%E8%A1%8C"
                target="_blank"
                rel="noopener noreferrer"
               aria-label="YouTube" title="YouTube">
              <span class="sns-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M21.2 7.7c-.2-1.1-.9-1.9-2-2.1C17.5 5.2 12 5.2 12 5.2s-5.5 0-7.2.4c-1.1.2-1.8 1-2 2.1-.3 1.8-.3 4.3-.3 4.3s0 2.5.3 4.3c.2 1.1.9 1.9 2 2.1 1.7.4 7.2.4 7.2.4s5.5 0 7.2-.4c1.1-.2 1.8-1 2-2.1.3-1.8.3-4.3.3-4.3s0-2.5-.3-4.3Z" fill="currentColor" />
                  <path d="M10 9v6l5-3-5-3Z" fill="#fff" />
                </svg>
              </span>
              <span class="visually-hidden">YouTube</span>
            </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <img
          class="footer-logo"
          src="assets/studio-romancing-logo.jpg"
          alt="Studio Romancing"
        />

        <div class="footer-social-links" aria-label="Official SNS">
          <a
            href="https://www.instagram.com/studioromancing/"
            target="_blank"
            rel="noopener noreferrer"
           aria-label="Instagram" title="Instagram">
              <span class="sns-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <rect x="3.5" y="3.5" width="17" height="17" rx="5" fill="none" stroke="currentColor" stroke-width="1.8" />
                  <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8" />
                  <circle cx="17.3" cy="6.7" r="1.2" fill="currentColor" />
                </svg>
              </span>
              <span class="visually-hidden">Instagram</span>
            </a>
          <a
            href="https://www.youtube.com/@%E6%A0%97%E5%8E%9F%E7%9B%B4%E8%A1%8C"
            target="_blank"
            rel="noopener noreferrer"
           aria-label="YouTube" title="YouTube">
              <span class="sns-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M21.2 7.7c-.2-1.1-.9-1.9-2-2.1C17.5 5.2 12 5.2 12 5.2s-5.5 0-7.2.4c-1.1.2-1.8 1-2 2.1-.3 1.8-.3 4.3-.3 4.3s0 2.5.3 4.3c.2 1.1.9 1.9 2 2.1 1.7.4 7.2.4 7.2.4s5.5 0 7.2-.4c1.1-.2 1.8-1 2-2.1.3-1.8.3-4.3.3-4.3s0-2.5-.3-4.3Z" fill="currentColor" />
                  <path d="M10 9v6l5-3-5-3Z" fill="#fff" />
                </svg>
              </span>
              <span class="visually-hidden">YouTube</span>
            </a>
        </div>

        <small id="copyright">&copy; 2026 Studio Romancing</small>
      </div>
    </footer>
    <a class="back-to-top" href="#top" aria-label="ページ上部へ戻る">
      <span aria-hidden="true">↑</span>
      <span class="back-to-top-text">Top</span>
    </a>
  </body>
</html>
