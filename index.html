<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>栗原直行 オフィシャルサイト</title>
    <meta
      name="description"
      content="栗原直行のプロフィール、出演情報、お知らせ、活動実績を掲載するオフィシャルサイトです。"
    />

    <link rel="stylesheet" href="styles.css?v=20260616-25" />
    <script src="script.js?v=20260616-11" defer></script>
  </head>
  <body>
    <header id="top" class="site-header home-site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <div class="container nav-inner">
          <a class="nav-logo" href="#top">
            <img
              class="nav-logo-image"
              src="assets/studio-romancing-logo-transparent.png"
              alt="Studio Romancing"
            />
            <span>栗原直行 Official Website</span>
          </a>
          <div class="nav-links">
            <a href="news.html">News</a>
            <a href="schedule.html">Schedule</a>
            <a href="profile.html">Profile</a>
            <a href="discography.html">Discography</a>
            <a href="#contact">Contact</a>
          </div>
        </div>
      </nav>

      <div class="container header-inner">
        <div class="hero-copy home-hero-copy">
          <div class="hero-text">
            <p id="hero-label" class="eyebrow">Official Website</p>
            <h1 id="artist-name">栗原直行</h1>
            <p class="hero-subtitle">NAOYUKI KURIHARA</p>
          </div>
          <figure class="hero-portrait">
            <img
              src="assets/naoyuki-kurihara-guitar.png"
              alt="栗原直行の演奏写真"
            />
          </figure>
        </div>
      </div>
    </header>

    <main>
      <section id="news" class="section news-section">
        <div class="container section-inner">
          <div class="section-heading">
            <p class="eyebrow">Information</p>
            <h2>News</h2>
          </div>
          <div id="news-list" class="card-list" aria-live="polite">
            <p class="muted">お知らせを読み込んでいます。</p>
          </div>
        </div>
      </section>

      <section id="schedule" class="section schedule-section">
        <div class="container section-inner">
          <div class="section-heading">
            <p class="eyebrow">Live / Event</p>
            <h2>Schedule</h2>
          </div>
          <div id="schedule-list" class="card-list" aria-live="polite">
            <p class="muted">出演情報を読み込んでいます。</p>
          </div>
        </div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="container section-inner">
          <div class="section-heading">
            <h2>Contact</h2>
          </div>
          <div id="contact-content" class="contact-content" aria-live="polite">
            <p class="muted">お問い合わせ情報を読み込んでいます。</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <img
          class="footer-logo"
          src="assets/studio-romancing-logo.jpg"
          alt="Studio Romancing"
        />
        <small id="copyright">&copy; 2026 Studio Romancing</small>
      </div>
    </footer>
  </body>
</html>
