<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>栗原直行オフィシャルサイト</title>
  <meta name="description" content="栗原直行のプロフィール、出演情報、お知らせ、活動実績を掲載するオフィシャルサイトです。" />

  <link rel="stylesheet" href="styles.css?v=20260616-4" />
  <script src="script.js?v=20260616-5" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">Official Website</p>
        <h1>栗原直行</h1>
        <p class="lead">プロフィール、出演情報、お知らせを掲載する公式サイトです。</p>
      </div>
    </div>
  </header>

  <main>
    <section class="section profile-section">
      <div class="container">
        <h2>Profile</h2>
        <div id="profile-content" class="profile-content" aria-live="polite">
          <p class="muted">プロフィールを読み込んでいます。</p>
        </div>
      </div>
    </section>

    <section class="section news-section">
      <div class="container">
        <h2>News</h2>
        <div id="news-list" class="card-list" aria-live="polite">
          <p class="muted">お知らせを読み込んでいます。</p>
        </div>
      </div>
    </section>

    <section class="section schedule-section">
      <div class="container">
        <h2>Schedule</h2>
        <div id="schedule-list" class="card-list" aria-live="polite">
          <p class="muted">出演情報を読み込んでいます。</p>
        </div>
      </div>
    </section>

    <section class="section contact-section">
      <div class="container">
        <h2>Contact</h2>
        <div id="contact-content" class="contact-content" aria-live="polite">
          <p class="muted">お問い合わせ情報を読み込んでいます。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; 2026 栗原直行</small>
    </div>
  </footer>
</body>
</html>
